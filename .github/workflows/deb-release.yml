name: Build DEB and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for the release (if using manual dispatch)'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    name: Build (.deb) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libpam0g-dev libssl-dev debhelper devscripts build-essential pkg-config \
            ca-certificates gnupg2

      - name: Build project
        run: cargo build --release --verbose

      - name: Build Debian package
        run: |
          set -e
          dpkg-buildpackage -us -uc -b

      - name: Collect DEB artifacts
        run: |
          mkdir -p deb-artifacts
          mv ../*.deb ../*.changes deb-artifacts/ || true

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-${{ matrix.os }}
          path: deb-artifacts/

  release:
    name: Create GitHub Release and upload DEBs
    runs-on: ubuntu-latest
    needs: build-deb
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts (ubuntu-20.04)
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-ubuntu-20.04
          path: downloaded/ubuntu-20.04 || true

      - name: Download artifacts (ubuntu-22.04)
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-ubuntu-22.04
          path: downloaded/ubuntu-22.04 || true

      - name: List downloaded files
        run: |
          find downloaded -type f -maxdepth 3 -print || true

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: Release ${{ steps.tag.outputs.tag }}
          body: Automated .deb builds for multiple Ubuntu versions
          draft: false
          prerelease: false

      - name: Upload .deb assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG=${{ steps.tag.outputs.tag }}
          # find all .deb files downloaded from matrix jobs
          assets=$(find downloaded -type f -name '*.deb' -print)
          if [ -z "$assets" ]; then
            echo "No .deb files found to upload"
            exit 0
          fi
          for file in $assets; do
            echo "Uploading $file to release $TAG"
            gh release upload "$TAG" "$file" --clobber
          done
