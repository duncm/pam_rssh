name: Build DEB and Release

on:
  push:
    branches: [ wip-ci ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for the release (if using manual dispatch)'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    name: Build (.deb) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, ubuntu-22.04-arm, ubuntu-24.04-arm, ubuntu-26.04-arm]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libpam0g-dev libssl-dev debhelper devscripts build-essential cargo rustc pkg-config

      - name: Build Debian package
        run: |
          set -e
          dpkg-buildpackage -us -uc -b

      - name: Collect DEB artifacts
        run: |
          mkdir -p deb-artifacts
          mv ../*.deb ../*.changes deb-artifacts/ || true

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-${{ matrix.os }}
          path: deb-artifacts/

  release:
    name: Create GitHub Release and upload DEBs
    runs-on: ubuntu-latest
    needs: build-deb
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts (ubuntu-26.04)
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-ubuntu-26.04
          path: downloaded/ubuntu-26.04

      - name: Download artifacts (ubuntu-24.04)
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-ubuntu-24.04
          path: downloaded/ubuntu-24.04

      - name: Download artifacts (ubuntu-22.04)
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-ubuntu-22.04
          path: downloaded/ubuntu-22.04

      - name: Download artifacts (ubuntu-26.04-arm)
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-ubuntu-26.04-arm
          path: downloaded/ubuntu-26.04-arm

      - name: Download artifacts (ubuntu-24.04-arm)
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-ubuntu-24.04-arm
          path: downloaded/ubuntu-24.04-arm

      - name: Download artifacts (ubuntu-22.04-arm)
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-ubuntu-22.04-arm
          path: downloaded/ubuntu-22.04-arm

      - name: Prefix .deb filenames with OS directory
        run: |
          set -e
          find downloaded -type f -name '*.deb' -print0 | while IFS= read -r -d '' f; do
            parent=$(basename "$(dirname "$f")")
            dirpath=$(dirname "$f")
            base=$(basename "$f")
            new="$dirpath/${parent}-${base}"
            mv "$f" "$new"
          done
          echo "Renamed .deb files:"
          find downloaded -type f -name '*.deb' -print || true

      - name: Create release and upload .deb assets
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: downloaded/**/*.deb
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: Automated .deb builds for multiple Ubuntu versions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
