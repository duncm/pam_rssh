name: Build DEB and Release

on:
  push:
    branches: [ wip-ci ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for the release (if using manual dispatch)'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ubuntu:
    name: Build (.deb) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, ubuntu-22.04-arm, ubuntu-24.04-arm, ubuntu-26.04-arm]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libpam0g-dev libssl-dev debhelper devscripts build-essential cargo rustc pkg-config

      - name: Build Debian package
        run: |
          set -e
          DEB_BUILD_OPTIONS=noautodbgsym dpkg-buildpackage -us -uc -b

      - name: Collect DEB artifacts
        run: |
          mkdir -p deb-artifacts
          mv ../*.deb ../*.changes deb-artifacts/ || true

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-${{ matrix.os }}
          path: deb-artifacts/

  build-debian:
    name: Build (.deb) on debian ${{ matrix.codename }} (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:${{ matrix.codename }}
    strategy:
      fail-fast: false
      matrix:
        codename: [trixie, bookworm, buster]
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - name: Prepare apt and install git for checkout
        run: |
          set -e
          # buster is EOL; its packages have moved to archive.debian.org
          if [ "${{ matrix.codename }}" = "buster" ]; then
            printf 'deb http://archive.debian.org/debian buster main\ndeb http://archive.debian.org/debian-security buster/updates main\n' \
              > /etc/apt/sources.list
            echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
          fi
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine architecture
        id: arch
        run: echo "deb_arch=$(dpkg --print-architecture)" >> "$GITHUB_OUTPUT"

      - name: Install build packages
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libpam0g-dev libssl-dev debhelper devscripts build-essential cargo rustc pkg-config \
            openssh-client curl ca-certificates

      - name: Install current Rust toolchain
        env:
          CARGO_HOME: /usr/local/cargo
          RUSTUP_HOME: /usr/local/rustup
        run: |
          set -e
          # The crate's pinned dependencies require a newer rustc than the
          # distro packages provide (e.g. time needs 1.88, and Cargo.lock is
          # format v4). Install a current toolchain and put it ahead of the
          # distro cargo/rustc on PATH; the distro packages remain installed
          # only to satisfy the debian/control build-dependency check.
          # Install under a fixed location so the toolchain is independent of
          # HOME, which the build step overrides below.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "/usr/local/cargo/bin" >> "$GITHUB_PATH"
          echo "CARGO_HOME=/usr/local/cargo" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=/usr/local/rustup" >> "$GITHUB_ENV"

      - name: Build Debian package
        env:
          # In a container job HOME defaults to /github/home, which does not
          # match the passwd home of any user. debian/rules' test step writes
          # generated ssh keys (and authorized_keys) under $HOME/.ssh, while
          # parse_user_authorized_keys() looks them up via getpwnam($USER).
          # Align all three on root so the test finds the keys it just wrote.
          HOME: /root
          USER: root
        run: |
          set -e
          mkdir -p "$HOME/.ssh"
          DEB_BUILD_OPTIONS=noautodbgsym dpkg-buildpackage -us -uc -b

      - name: Collect DEB artifacts
        run: |
          mkdir -p deb-artifacts
          mv ../*.deb ../*.changes deb-artifacts/ || true

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-debian-${{ matrix.codename }}-${{ steps.arch.outputs.deb_arch }}
          path: deb-artifacts/

  build-rpm:
    name: Build (.rpm) on ${{ matrix.target.id }} (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.target.image }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { id: fedora, image: 'fedora:latest' }
          - { id: rocky9, image: 'rockylinux:9' }
          # Rocky 10 is not published as a Docker Official Image (that line
          # ended at 9); it lives under the project's own namespace.
          - { id: rocky10, image: 'rockylinux/rockylinux:10' }
          - { id: amazonlinux2023, image: 'amazonlinux:2023' }
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - name: Prepare repos and install git for checkout
        run: |
          set -e
          # On RHEL rebuilds the -devel packages (e.g. pam-devel) live in the
          # CRB repo, which is disabled by default.
          case "${{ matrix.target.id }}" in
            rocky*)
              dnf install -y dnf-plugins-core
              dnf config-manager --set-enabled crb
              ;;
          esac
          dnf install -y git ca-certificates

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine architecture
        id: arch
        run: echo "rpm_arch=$(rpm --eval '%{_arch}')" >> "$GITHUB_OUTPUT"

      - name: Install build packages
        run: |
          # Do not install "curl": these images ship curl-minimal, which
          # already provides the curl binary, and pulling full curl conflicts
          # with it on dnf4 (Rocky, Amazon Linux).
          dnf install -y \
            pam-devel openssl-devel gcc make pkgconfig \
            rpm-build tar findutils ca-certificates

      - name: Install current Rust toolchain
        env:
          CARGO_HOME: /usr/local/cargo
          RUSTUP_HOME: /usr/local/rustup
        run: |
          set -e
          # The crate's pinned dependencies require a newer rustc than the
          # distro packages provide. Install a current toolchain under a fixed
          # location; the build step below puts it on PATH.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable

      - name: Build RPM package
        env:
          CARGO_HOME: /usr/local/cargo
          RUSTUP_HOME: /usr/local/rustup
        run: |
          set -e
          # Prepend cargo to PATH here rather than via $GITHUB_PATH: some
          # container images (e.g. rockylinux/rockylinux:10) do not declare
          # PATH in their config, and appending to $GITHUB_PATH then leaves the
          # next step with a PATH that drops /usr/bin, breaking even sh.
          export PATH="/usr/local/cargo/bin:$PATH"
          version=$(rpmspec -q --srpm --qf '%{version}\n' rpm/pam_rssh.spec)
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,BUILDROOT,RPMS,SRPMS}
          # rpmbuild expects a versioned source tarball; build one from the
          # checkout (including the ssh-agent.rs submodule).
          tar czf ~/rpmbuild/SOURCES/pam_rssh-${version}.tar.gz \
            --exclude=./.git --transform "s,^\.,pam_rssh-${version}," .
          rpmbuild -bb rpm/pam_rssh.spec

      - name: Collect RPM artifacts
        run: |
          mkdir -p rpm-artifacts
          find ~/rpmbuild/RPMS -type f -name '*.rpm' -exec cp {} rpm-artifacts/ \;

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages-${{ matrix.target.id }}-${{ steps.arch.outputs.rpm_arch }}
          path: rpm-artifacts/

  release:
    name: Create GitHub Release and upload packages
    runs-on: ubuntu-latest
    needs: [build-ubuntu, build-debian, build-rpm]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-packages-*'
          path: downloaded

      - name: Prefix package filenames with distro/arch directory
        run: |
          set -e
          find downloaded -type f \( -name '*.deb' -o -name '*.rpm' \) -print0 \
            | while IFS= read -r -d '' f; do
            parent=$(basename "$(dirname "$f")")
            # strip the shared "<deb|rpm>-packages-" prefix from the dir name
            label=${parent#deb-packages-}
            label=${label#rpm-packages-}
            dirpath=$(dirname "$f")
            base=$(basename "$f")
            new="$dirpath/${label}-${base}"
            mv "$f" "$new"
          done
          echo "Renamed package files:"
          find downloaded -type f \( -name '*.deb' -o -name '*.rpm' \) -print || true

      - name: Create release and upload package assets
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            downloaded/**/*.deb
            downloaded/**/*.rpm
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: Automated .deb (Ubuntu 22.04/24.04/26.04, Debian trixie/bookworm/buster) and .rpm (Fedora, Rocky 9/10, Amazon Linux 2023) builds on amd64 and arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
